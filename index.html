<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>すなばぐらり</title>
<style>
:root{
  --bg1:#fff8ef; --bg2:#fddfc2; --sky1:#fff7df; --sky2:#ffd5ae;
  --panel:rgba(255,255,255,.84); --panelStrong:rgba(255,255,255,.96);
  --line:rgba(108,78,47,.12); --text:#5c3f29; --sub:#8d6a48;
  --accent:#ff9c62; --accentDeep:#e67741; --mint:#6bcbbb;
  --blue:#7daaff; --violet:#c58ef7; --danger:#ff5d69; --gold:#e2b95d;
  --shadow:0 12px 28px rgba(100,69,42,.13);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;touch-action:none;}
html,body{margin:0;height:100%;overflow:hidden;color:var(--text);font-family:"Hiragino Sans","Yu Gothic UI",system-ui,sans-serif;background:linear-gradient(180deg,var(--bg1),var(--bg2));}
body::before{content:"";position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle at 15% 12%,rgba(255,255,255,.78) 0 8%,transparent 9%),radial-gradient(circle at 82% 14%,rgba(255,255,255,.68) 0 6%,transparent 7%),radial-gradient(circle at 72% 7%,rgba(255,232,184,.48) 0 11%,transparent 12%),linear-gradient(180deg,var(--sky1),transparent 40%);opacity:.95;}
#app{position:relative;display:flex;flex-direction:column;height:100dvh;max-width:680px;margin:0 auto;padding:calc(4px + var(--safe-top)) 6px calc(4px + var(--safe-bottom));gap:5px;}
.panel{background:var(--panel);border-radius:18px;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.68);box-shadow:var(--shadow);}
.header{padding:5px 11px 4px;flex-shrink:0;}
.title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.header h1{margin:0;font-size:17px;font-weight:900;letter-spacing:.03em;}
.header p{margin:2px 0 0;font-size:9px;line-height:1.3;color:var(--sub);font-weight:800;}
.round-chip{padding:5px 9px;border-radius:999px;background:rgba(255,255,255,.9);box-shadow:0 6px 16px rgba(113,78,47,.06);font-size:10px;font-weight:900;white-space:nowrap;transition:.25s ease;}
.round-chip.danger{background:linear-gradient(135deg,#ff6a75,#ff985f);color:#fff;box-shadow:0 6px 20px rgba(255,90,102,.26);}
.turn-list{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-top:5px;}
.p-badge{position:relative;padding:6px 6px 6px;min-height:36px;border-radius:11px;background:rgba(255,255,255,.84);border:2px solid transparent;transition:.24s ease;overflow:hidden;}
.p-badge::after{content:"";position:absolute;right:6px;top:6px;width:8px;height:8px;border-radius:50%;background:currentColor;opacity:.95;}
.p-badge strong{display:block;font-size:13px;margin-bottom:0;font-weight:900;}
.p-badge span{display:block;font-size:8px;line-height:1.15;color:var(--sub);font-weight:800;}
.p-badge.active{transform:translateY(-2px) scale(1.03);border-color:var(--accent);box-shadow:0 10px 22px rgba(255,156,98,.22);}
.p-badge.dead{opacity:.34;filter:grayscale(1);}
.p-badge.dead::before{content:"脱落";position:absolute;right:7px;bottom:6px;font-size:9px;font-weight:900;color:#8d7c67;}
.p-badge.winner{border-color:var(--gold);background:rgba(255,243,196,.95);animation:winPulse 1.15s ease-in-out infinite;}
@keyframes winPulse{0%,100%{box-shadow:0 0 0 0 rgba(226,185,93,.42)}50%{box-shadow:0 0 0 8px rgba(226,185,93,0)}}
.stage-shell{flex:1;min-height:0;display:flex;flex-direction:column;gap:5px;}
.speech-bar{height:44px;display:none;align-items:center;justify-content:center;padding:0 10px;flex-shrink:0;overflow:hidden;}
.speech-bar.active{display:flex;}
#speechText{font-size:15px;font-weight:900;color:var(--text);opacity:0;transition:opacity .25s ease;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:96%;padding:6px 16px;border-radius:10px;border:1.5px solid transparent;text-align:center;}
#speechText.show{opacity:1;border-color:rgba(108,78,47,.22);background:rgba(255,255,255,.82);}
#speechText.human{color:var(--text);border-color:rgba(255,156,98,.4);background:rgba(255,248,240,.9);}
#speechText.danger{color:var(--danger);border-color:rgba(255,93,105,.4);background:rgba(255,240,240,.9);}

.top-status{display:grid;grid-template-columns:1.1fr .95fr;gap:5px;flex-shrink:0;}
.info-card,.meter-card{padding:7px 10px 8px;border-radius:14px;background:var(–panelStrong);border:1px solid rgba(255,255,255,.72);box-shadow:var(–shadow);transition:.25s ease;}
.info-card h2{margin:0 0 2px;font-size:14px;line-height:1.1;}
.info-card h2.dangerText{color:var(–danger)}
.info-card .desc{min-height:22px;font-size:9.5px;line-height:1.35;font-weight:800;}
.info-card .sub{margin-top:4px;font-size:9px;font-weight:900;color:var(–sub);}
.meter-card.dangerBg{background:rgba(255,225,225,.96)}
.meter-row{display:flex;justify-content:space-between;gap:8px;align-items:flex-end;}
.meter-big{font-size:15px;line-height:1;font-weight:900;}
.meter-big.low{color:var(–danger)}
.meter-small{margin-top:2px;font-size:10px;color:var(–sub);font-weight:900;}
.meter-track{position:relative;height:10px;margin-top:7px;border-radius:999px;overflow:hidden;background:rgba(96,69,42,.09);}
.meter-fill{position:absolute;inset:0 auto 0 0;width:100%;border-radius:999px;transition:width .25s ease, background .25s ease;}
.meter-fill.full{background:linear-gradient(90deg,var(–mint),#f2d16d)}
.meter-fill.mid{background:linear-gradient(90deg,#f2d16d,#ff9c62)}
.meter-fill.low{background:linear-gradient(90deg,#ff9c62,var(–danger));animation:meterPulse .6s ease-in-out infinite}
@keyframes meterPulse{0%,100%{opacity:1}50%{opacity:.64}}
.meter-tag{margin-top:5px;text-align:right;font-size:9px;color:var(–sub);font-weight:900;}
.meter-tag.warn{color:#d87b37} .meter-tag.crit{color:var(–danger)}
.stage-area{position:relative;flex:1;min-height:260px;border-radius:30px;overflow:hidden;background:radial-gradient(circle at 50% 8%,rgba(255,255,255,.86),transparent 18%),linear-gradient(180deg,rgba(255,255,255,.44),rgba(255,255,255,.18));box-shadow:inset 0 0 50px rgba(0,0,0,.03), var(–shadow);transition:.25s ease;}
.stage-area.dangerGlow{box-shadow:inset 0 0 0 2px rgba(255,93,105,.23), inset 0 0 72px rgba(255,93,105,.14), var(–shadow);animation:dangerBorder .7s ease-in-out infinite;}
.stage-area.criticalGlow{box-shadow:inset 0 0 0 3px rgba(255,93,105,.46), inset 0 0 94px rgba(255,93,105,.24), var(–shadow);animation:dangerBorder .38s ease-in-out infinite;}
@keyframes dangerBorder{0%,100%{filter:saturate(1)}50%{filter:saturate(1.08)}}
canvas{display:block;width:100%;height:100%}
.stage-hud{position:absolute;left:10px;right:10px;top:10px;display:flex;justify-content:space-between;gap:8px;pointer-events:none;}
.chip{display:flex;align-items:center;gap:6px;padding:7px 11px;border-radius:999px;background:rgba(255,255,255,.92);box-shadow:0 4px 12px rgba(0,0,0,.06);font-size:10.5px;font-weight:900;transition:.25s ease;}
.chip.dangerChip{background:rgba(255,93,105,.94);color:#fff;}
.action-banner{display:none;position:absolute;left:50%;top:52px;transform:translateX(-50%);max-width:82%;padding:9px 14px;border-radius:14px;background:rgba(91,63,41,.92);color:#fff;font-size:11px;font-weight:900;text-align:center;white-space:nowrap;box-shadow:0 8px 18px rgba(91,63,41,.18);opacity:0;pointer-events:none;transition:.22s ease;}
.action-banner.show{opacity:1;transform:translateX(-50%) translateY(0);}
.danger-overlay{position:absolute;inset:0;z-index:4;pointer-events:none;border-radius:30px;opacity:0;transition:.25s ease;background:radial-gradient(ellipse at center,transparent 38%,rgba(255,60,60,.06) 82%);}
.danger-overlay.show{opacity:1} .danger-overlay.crit{background:radial-gradient(ellipse at center,transparent 26%,rgba(255,60,60,.16) 72%)}
.flash{position:absolute;inset:0;z-index:5;pointer-events:none;border-radius:30px;background:radial-gradient(circle at center,rgba(255,255,255,.56),transparent 52%);opacity:0;transition:.18s ease;}
.flash.show{opacity:1}
.tilt-indicator{position:absolute;left:50%;bottom:12px;transform:translateX(-50%);display:flex;align-items:center;gap:6px;pointer-events:none;opacity:.88;z-index:6;}
.tilt-arrow{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.9);font-size:14px;transition:.25s ease;}
.tilt-arrow.warn{background:rgba(255,154,97,.9)} .tilt-arrow.crit{background:rgba(255,93,105,.92);animation:arrowPulse .5s ease-in-out infinite}
@keyframes arrowPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.16)}}
.tilt-dot{width:8px;height:8px;border-radius:50%;background:rgba(91,63,41,.28);transition:.24s ease;}
.tilt-dot.active{background:var(–danger)}
.menu-overlay{position:absolute;inset:0;z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;background:rgba(255,252,248,.95);transition:.3s ease;}
.menu-overlay.hidden{opacity:0;pointer-events:none;transform:scale(1.05);}
.menu-overlay h2{margin:0 0 10px;}
.title-logo{font-size:76px;font-weight:900;letter-spacing:1px;color:var(–text);text-shadow:0 3px 0 rgba(253,232,208,.95),0 8px 18px rgba(120,83,52,.12);margin-bottom:8px;line-height:1.05}
.title-logo span{color:var(–accent)}
.subtitle{font-size:13px;line-height:1.8;opacity:.9;max-width:320px}
@keyframes softPulse{0%,100%{box-shadow:inset 0 0 0 2px rgba(255,90,102,.24),inset 0 0 70px rgba(255,90,102,.14),var(–shadow)}50%{box-shadow:inset 0 0 0 2px rgba(255,90,102,.34),inset 0 0 88px rgba(255,90,102,.2),var(–shadow)}}
.menu-overlay p{margin:0 0 24px;font-size:12px;line-height:1.7;color:var(–sub);font-weight:700;white-space:pre-line;}
.big-btn{border:none;border-radius:20px;padding:22px 64px;font-size:26px;font-weight:900;color:#fff;background:linear-gradient(180deg,var(–accent),var(–accentDeep));box-shadow:0 10px 0 #d46e41, 0 14px 24px rgba(255,156,98,.25);cursor:pointer;transition:.1s ease;}
.big-btn:active{transform:translateY(4px);box-shadow:0 4px 0 #d46e41, 0 8px 12px rgba(255,156,98,.18);}
.bottom-panel{flex-shrink:0;}
.footer{padding:8px 7px 8px;display:grid;grid-template-columns:1fr 62px 72px;gap:5px;align-items:center;}
.help-box{padding:5px 8px;border-radius:10px;background:rgba(255,252,248,.8);border:1px solid rgba(129,92,58,.10);font-size:8.5px;line-height:1.4;font-weight:800;}
.help-box strong{display:inline;margin-right:3px;}
.small-btn{border:none;min-width:0;height:38px;padding:0 8px;border-radius:12px;background:rgba(255,255,255,.88);color:var(–text);font-size:12px;font-weight:900;box-shadow:0 4px 10px rgba(100,69,42,.08);transition:.12s ease;cursor:pointer;}
.small-btn:active{transform:translateY(2px);box-shadow:0 2px 5px rgba(100,69,42,.08);}
.small-btn.accent{color:#fff;background:linear-gradient(180deg,#ffb37c,var(–accent));box-shadow:0 9px 18px rgba(255,156,98,.25);}
#toast{position:fixed;left:50%;bottom:86px;transform:translateX(-50%);z-index:200;max-width:82%;padding:10px 16px;border-radius:13px;background:rgba(91,63,41,.94);color:#fff;font-size:11.5px;text-align:center;pointer-events:none;opacity:0;transition:.25s ease;}
#toast.show{opacity:1}
.log-wrap{display:none}.log-view{height:0}

#announceFlash{
position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;
pointer-events:none;opacity:0;transition:opacity .18s ease;
}
#announceFlash.show{opacity:1;}
#announceFlash .af-inner{
padding:18px 28px;border-radius:20px;
background:rgba(40,26,14,.88);
color:#fff;font-size:19px;font-weight:900;
text-align:center;line-height:1.4;
box-shadow:0 12px 40px rgba(0,0,0,.35);
max-width:82vw;
transform:scale(.88);transition:transform .2s ease;
}
#announceFlash.show .af-inner{transform:scale(1);}

@media (max-width:520px){
#app{padding:calc(3px + var(–safe-top)) 5px calc(3px + var(–safe-bottom));gap:4px}
.header{padding:6px 9px 5px} .header h1{font-size:15px}
.top-status{grid-template-columns:1fr 1fr;gap:4px}
.info-card,.meter-card{padding:6px 8px} .info-card h2{font-size:13px}
.footer{grid-template-columns:1fr 56px 66px;gap:4px}
.small-btn{height:34px;font-size:11px}
.help-box{font-size:8px;padding:4px 7px}
}
</style>

</head>
<body>
